name: Deploy to Ghost

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build theme
        run: |
          bun run clean
          bun run build
          bun run compress

      - name: Validate theme
        run: bunx gscan -z dist/attegi.zip

      - name: Deploy to Ghost
        env:
          GHOST_ADMIN_API_URL: ${{ secrets.GHOST_ADMIN_API_URL }}
          GHOST_ADMIN_API_KEY: ${{ secrets.GHOST_ADMIN_API_KEY }}
          GHOST_ADMIN_API_VERSION: v6.0
        run: bun scripts/deploy-theme.js dist/attegi.zip
